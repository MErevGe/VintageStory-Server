name: Build, test and publish container

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths-ignore: ['**.md', 'LICENSE', '.gitignore', 'docker-compose.yml']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE', '.gitignore', 'docker-compose.yml']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Set repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN to also publish
  # to Docker Hub (docker.io/<user>/<repo>); leave unset to publish only to GHCR.
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dotnet: "7.0"
            variant: dotnet7
            expect_dotnet: "7"
            test_vs: "1.20.12"
            latest: "false"
          - dotnet: "8.0"
            variant: dotnet8
            expect_dotnet: "8"
            test_vs: "1.21.5"
            latest: "false"
          - dotnet: "10.0"
            variant: dotnet10
            expect_dotnet: "10"
            test_vs: "1.22.3"
            latest: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          variant="${{ matrix.variant }}"
          latest=no
          if [ "${{ matrix.latest }}" = "true" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            latest=yes
          fi
          image="${IMAGE_NAME,,}"          # registries require lowercase
          bases=("${REGISTRY}/${image}")
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            bases+=("docker.io/${DOCKERHUB_USERNAME}/${image##*/}")
          fi
          tags=""
          for b in "${bases[@]}"; do
            tags="${tags:+$tags,}${b}:${variant}"
            if [ "$latest" = yes ]; then tags="${tags},${b}:latest"; fi
          done
          echo "push_tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "test_tag=vintagestory-ci:${variant}" >> "$GITHUB_OUTPUT"

      - name: Build image for testing (.NET ${{ matrix.dotnet }})
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          build-args: DOTNET_VERSION=${{ matrix.dotnet }}
          tags: ${{ steps.tags.outputs.test_tag }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      - name: Test image
        env:
          EXPECT_DOTNET: ${{ matrix.expect_dotnet }}
          TEST_VS_VERSION: ${{ matrix.test_vs }}
        run: |
          chmod +x tests/smoke-test.sh
          ./tests/smoke-test.sh ${{ steps.tags.outputs.test_tag }}

      - name: Build and push
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: DOTNET_VERSION=${{ matrix.dotnet }}
          tags: ${{ steps.tags.outputs.push_tags }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
